name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MOODLE_BASE_URL: https://moodle.example.edu
      MOODLE_SERVICE: moodle_mobile_app
      SESSION_PASSWORD: ci-only-session-password-at-least-32-bytes

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        run: |
          rm -rf node_modules
          bun install --frozen-lockfile --no-cache

      - name: Verify lint toolchain
        run: |
          bun -e '
            const [eslint, typescript] = await Promise.all([
              Bun.file("node_modules/eslint/package.json").json(),
              Bun.file("node_modules/typescript/package.json").json(),
            ]);
            if (!eslint.version.startsWith("9.") || !typescript.version.startsWith("5.")) {
              throw new Error(`Unsupported lint toolchain: ESLint ${eslint.version}, TypeScript ${typescript.version}`);
            }
          '

      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Run unit tests
        run: bun test

      - name: Build
        run: bun run build
